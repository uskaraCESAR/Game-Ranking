name: Django CI/CD - Azure

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "False"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "http://localhost"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Collect Static Files
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DEBUG: "False"
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        ALLOWED_HOSTS: "game-ranking-app-ehfhd4gnhvgtatfq.brazilsouth-01.azurewebsites.net"
        CSRF_TRUSTED_ORIGINS: "https://game-ranking-app-ehfhd4gnhvgtatfq.brazilsouth-01.azurewebsites.net"
      run: |
        python manage.py collectstatic --noinput

    - name: Configure Azure App Settings
      uses: azure/appservice-settings@v1
      with:
        app-name: game-ranking-app
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        app-settings-json: |
          [
            { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false },
            { "name": "SECRET_KEY", "value": "${{ secrets.SECRET_KEY }}", "slotSetting": false },
            { "name": "ALLOWED_HOSTS", "value": "game-ranking-app-ehfhd4gnhvgtatfq.brazilsouth-01.azurewebsites.net", "slotSetting": false },
            { "name": "CSRF_TRUSTED_ORIGINS", "value": "https://game-ranking-app-ehfhd4gnhvgtatfq.brazilsouth-01.azurewebsites.net", "slotSetting": false },
            { "name": "DEBUG", "value": "False", "slotSetting": false },
            { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true", "slotSetting": false }
          ]

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: game-ranking-app
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .
